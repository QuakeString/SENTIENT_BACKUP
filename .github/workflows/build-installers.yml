name: build-installers

# Produces downloadable installers for each desktop OS.
# Run manually (Actions -> build-installers -> Run workflow) or on a version tag.
on:
  workflow_dispatch:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  bundle:
    name: bundle (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Install Linux GTK/WebKit deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libgtk-3-dev libfuse2
      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2" --locked
      - name: Stage bundled PostgreSQL client tools (Windows)
        if: runner.os == 'Windows'
        run: python scripts/fetch_pgtools.py
      - name: Stage bundled PostgreSQL client tools (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get install -y postgresql-common
          sudo /usr/share/postgresql-common/pgdg/apt.postgresql.org.sh -y
          sudo apt-get install -y postgresql-client-18
          bash scripts/fetch_pgtools_linux.sh /usr/lib/postgresql/18/bin
      - name: Build installers
        run: cargo tauri build
      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          if-no-files-found: warn
          path: |
            src-tauri/target/release/bundle/**/*.msi
            src-tauri/target/release/bundle/**/*.exe
            src-tauri/target/release/bundle/**/*.dmg
            src-tauri/target/release/bundle/**/*.AppImage
            src-tauri/target/release/bundle/**/*.deb
      # Raw dynamically-linked ELF binary — links the SYSTEM webkit/gtk at run
      # time, so it works on rolling distros (Arch) where the AppImage's bundled
      # Ubuntu libs clash. Bundled with pg_dump/pg_restore 18 (next to the exe)
      # so it doesn't depend on the host's PostgreSQL version. Needs the host's
      # webkit2gtk-4.1 installed.
      - name: Package Linux native binary + pg tools
        if: runner.os == 'Linux'
        run: |
          bin=$(find src-tauri/target/release -maxdepth 1 -type f -executable \
                ! -name '*.so' ! -name '*.d' | head -1)
          echo "native binary: $bin"
          app=dist-linux/sentient-backup-restore
          mkdir -p "$app"
          cp "$bin" "$app/sentient-backup-restore"
          chmod +x "$app/sentient-backup-restore"
          cp -r src-tauri/pgtools "$app/pgtools"
          tar -C dist-linux -czf sentient-backup-restore-linux-x64.tar.gz sentient-backup-restore
          echo "tarball:"; tar -tzf sentient-backup-restore-linux-x64.tar.gz | head -20
      - name: Upload Linux native binary
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: linux-binary
          if-no-files-found: error
          path: sentient-backup-restore-linux-x64.tar.gz

  # Native Arch Linux package (.pkg.tar.zst) built with makepkg in an Arch
  # container from the linux-binary tarball. Adds a .desktop + icon (so it shows
  # in the launcher/taskbar) and declares its deps for pacman.
  arch-package:
    name: arch package
    runs-on: ubuntu-latest
    needs: bundle
    steps:
      - uses: actions/checkout@v4
      - name: Download linux-binary
        uses: actions/download-artifact@v4
        with:
          name: linux-binary
          path: pkgsrc
      - name: Build .pkg.tar.zst
        run: |
          cp packaging/arch/PKGBUILD pkgsrc/
          cp packaging/arch/sentient-backup-restore.desktop pkgsrc/
          cp src-tauri/icons/128x128.png pkgsrc/sentient-backup-restore.png
          ver="${GITHUB_REF_NAME#v}"; [ -n "$ver" ] && [ "$ver" != "$GITHUB_REF_NAME" ] || ver="0.0.0"
          sed -i "s/^pkgver=.*/pkgver=${ver}/" pkgsrc/PKGBUILD
          docker run --rm -v "$PWD/pkgsrc:/pkg" archlinux:latest bash -c '
            pacman -Sy --noconfirm --needed base-devel sudo >/dev/null
            useradd -m builder
            chown -R builder /pkg
            cd /pkg
            sudo -u builder makepkg -f --nodeps
          '
          ls -l pkgsrc/*.pkg.tar.zst
      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: arch-package
          if-no-files-found: error
          path: pkgsrc/*.pkg.tar.zst
